services:
  mysql:
    image: mysql:8.4
    container_name: font-ninja-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: font_ninja
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./DB/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: font-ninja-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_ENABLED: "true"
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: app
      DB_PASSWORD: app
      DB_NAME: font_ninja
      NODE_ENV: development
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/api/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run start:dev

  scrapper_bbc:
    build:
      context: ./scrapper
      dockerfile: Dockerfile
    container_name: font-ninja-scrapper-bbc
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: development
      BACKEND_API_URL: http://backend:3000/api
      URI_TO_SCRAP: "https://www.bbc.com/news"
      EXTRACTOR_FILE: ExtractArticle_BBC.js
      SCRAPPER_ID: 1
      SCRAPPER_STARTUP_STATE: run
      SCRAPPER_RESTART_DELAY_SECONDS: 60
    volumes:
      - ./scrapper:/app
      - ./scrapper_extract:/extractors:ro
      - /app/node_modules
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          npm start
          exit_code=$?
          echo "[scrapper] process stopped with code $$exit_code, restart in $${SCRAPPER_RESTART_DELAY_SECONDS:-60}s"
          sleep "${SCRAPPER_RESTART_DELAY_SECONDS:-60}"
        done

  scrapper_ycombinator:
    build:
      context: ./scrapper
      dockerfile: Dockerfile
    container_name: font-ninja-scrapper-ycombinator
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: development
      BACKEND_API_URL: http://backend:3000/api
      URI_TO_SCRAP: "https://news.ycombinator.com/"
      EXTRACTOR_FILE: ExtractArticle_YCOMBINATOR.js
      SCRAPPER_ID: 2
      SCRAPPER_STARTUP_STATE: run
      SCRAPPER_RESTART_DELAY_SECONDS: 60
    volumes:
      - ./scrapper:/app
      - ./scrapper_extract:/extractors:ro
      - /app/node_modules
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          npm start
          exit_code=$?
          echo "[scrapper] process stopped with code $$exit_code, restart in $${SCRAPPER_RESTART_DELAY_SECONDS:-60}s"
          sleep "${SCRAPPER_RESTART_DELAY_SECONDS:-60}"
        done

volumes:
  mysql_data:
